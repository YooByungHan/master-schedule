name: Build Server Desktop App

# Terminus MasterSchedule Server (Electron 트레이 앱) 자동 빌드
#  - 'server-v*' 태그를 push 하거나 (예: server-v1.0.0)
#  - Actions 탭에서 수동 실행(Run workflow) 하면
#  Windows용 설치파일(.exe)을 빌드해 GitHub Release(초안)에 업로드한다.
#
# Pro와 달리 OAuth 자격증명 생성 단계가 없다 — server.js는 저장소에 커밋된
# oauth-default.json(난독화된 공용 기본값)을 자동으로 읽으므로 빌드 시
# 별도 시크릿 주입이 필요 없다.

on:
  push:
    tags:
      - 'server-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치 (server-app)
        working-directory: server-app
        run: npm install

      - name: 빌드 + Release 업로드 (electron-builder)
        working-directory: server-app
        run: npm run dist
        env:
          # electron-builder 가 GitHub Release 에 업로드할 때 사용하는 토큰
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release 제목에 "Server" 표시 (Pro 릴리즈와 구분)
        # 태그(v1.1.0 등)는 electron-updater가 semver로 파싱해야 하므로 그대로 두고,
        # 화면에 보이는 제목만 "Terminus MasterSchedule Server vX.Y.Z"로 바꿔 Releases
        # 목록에서 Pro 빌드와 한눈에 구분되게 한다(자동업데이트 동작에는 영향 없음).
        working-directory: server-app
        shell: bash
        run: node ../scripts/set-release-name.js Server "$(node -p "require('./package.json').version")"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
