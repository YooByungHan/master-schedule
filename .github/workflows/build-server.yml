name: Build Server Desktop App

# Terminus MasterSchedule Server (Electron 트레이 앱) 자동 빌드
#  - 'server-v*' 태그를 push 하거나 (예: server-v1.0.0)
#  - Actions 탭에서 수동 실행(Run workflow) 하면
#  Windows용 설치파일(.exe)을 빌드해 GitHub Release(초안)에 업로드한다.
#
# Pro와 달리 OAuth 자격증명 생성 단계가 없다 — server.js는 저장소에 커밋된
# oauth-default.json(난독화된 공용 기본값)을 자동으로 읽으므로 빌드 시
# 별도 시크릿 주입이 필요 없다.
#
# (2026-07-13 변경) Pro/Server가 같은 저장소(master-schedule)의 GitHub Release를
# 공유하면 electron-updater가 "저장소의 최신 릴리스"를 앱 구분 없이 집어가는
# 충돌이 생겨(둘 다 같은 순간 발행되면 서로의 latest.yml/server.yml을 못 찾음),
# Server 릴리스는 전용 저장소(Terminus-MasterSchedule-Server)로 분리했다.
# 기본 GITHUB_TOKEN은 그 저장소가 아니라 master-schedule에만 쓸 수 있으므로,
# 해당 저장소에 대한 쓰기 권한을 가진 개인 액세스 토큰을 SERVER_RELEASE_TOKEN
# 시크릿으로 별도 등록해서 사용한다.

on:
  push:
    tags:
      - 'server-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치 (server-app)
        working-directory: server-app
        run: npm install

      - name: 빌드 + Release 업로드 (electron-builder)
        working-directory: server-app
        run: npm run dist
        env:
          # electron-builder 가 Terminus-MasterSchedule-Server 저장소에 Release를
          # 올릴 때 쓰는 토큰. 기본 GITHUB_TOKEN은 이 저장소(master-schedule)에만
          # 쓸 수 있어서 별도 저장소용 PAT을 SERVER_RELEASE_TOKEN으로 등록해 사용.
          GH_TOKEN: ${{ secrets.SERVER_RELEASE_TOKEN }}

      - name: Release 제목에 "Server" 표시 (Pro 릴리즈와 구분)
        # 태그(v1.1.0 등)는 electron-updater가 semver로 파싱해야 하므로 그대로 두고,
        # 화면에 보이는 제목만 "Terminus MasterSchedule Server vX.Y.Z"로 바꿔 Releases
        # 목록에서 Pro 빌드와 한눈에 구분되게 한다(자동업데이트 동작에는 영향 없음).
        working-directory: server-app
        shell: bash
        run: node ../scripts/set-release-name.js Server "$(node -p "require('./package.json').version")"
        env:
          GH_TOKEN: ${{ secrets.SERVER_RELEASE_TOKEN }}
          GH_REPO: YooByungHan/Terminus-MasterSchedule-Server
