name: Build Pro Desktop App

# Terminus MasterSchedule Pro (Electron) 자동 빌드
#  - 'pro-v*' 태그를 push 하거나 (예: pro-v0.1.0)
#  - Actions 탭에서 수동 실행(Run workflow) 하면
#  Windows용 설치파일(.exe)을 빌드해 GitHub Release(초안)에 업로드한다.

on:
  push:
    tags:
      - 'pro-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치 (pro)
        working-directory: pro
        run: npm install

      - name: YouTube 구독 게이트 OAuth 자격증명 파일 생성
        # 저장소 Settings → Secrets and variables → Actions 에 등록된
        # GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET (Device Flow용, "TVs and
        # Limited Input devices" 클라이언트) 로 pro/oauth-config.json 을 생성한다.
        # 커밋되지 않고(.gitignore) 빌드마다 새로 만들어져 앱에 번들된다.
        # 시크릿이 없으면 빈 파일이 생성되어 게이트가 비활성화된 채로 빌드된다(개발 편의).
        working-directory: pro
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const clientId = process.env.GOOGLE_OAUTH_CLIENT_ID || '';
            const clientSecret = process.env.GOOGLE_OAUTH_CLIENT_SECRET || '';
            fs.writeFileSync('oauth-config.json', JSON.stringify({ clientId, clientSecret }, null, 2));
            console.log('oauth-config.json 생성됨 (clientId 설정됨:', !!clientId, ')');
          "
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

      - name: 빌드 + Release 업로드 (electron-builder)
        working-directory: pro
        run: npm run dist
        env:
          # electron-builder 가 GitHub Release 에 업로드할 때 사용하는 토큰
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
