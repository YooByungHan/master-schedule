name: Build Pro Desktop App

# Terminus MasterSchedule Pro (Electron) 자동 빌드
#  - 'pro-v*' 태그를 push 하거나 (예: pro-v0.1.0)
#  - Actions 탭에서 수동 실행(Run workflow) 하면
#  Windows용 설치파일(.exe)을 빌드해 GitHub Release(초안)에 업로드한다.
#
# (2026-07-13 변경) Pro 릴리스는 전용 저장소(Terminus-MasterSchedule-Pro)로
# 분리했다 — 유튜브를 보고 오는 일반 사용자가 소스코드 없이 README+다운로드
# 링크만 있는 단순한 저장소로 접근하도록 하기 위함. (Server도 같은 이유로
# 앞서 Terminus-MasterSchedule-Server로 분리됨 — 자세한 배경은 그쪽 커밋 참고.)
# 기본 GITHUB_TOKEN은 이 저장소(master-schedule)에만 쓸 수 있으므로, 전용
# 저장소에 쓰기 권한을 가진 PAT을 PRO_RELEASE_TOKEN 시크릿으로 등록해 사용한다.

on:
  push:
    tags:
      - 'pro-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치 (pro)
        working-directory: pro
        run: npm install

      - name: YouTube 구독 게이트 OAuth 자격증명 파일 생성(난독화)
        # 저장소 Settings → Secrets and variables → Actions 에 등록된
        # GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET (Device Flow용, "TVs and
        # Limited Input devices" 클라이언트) 로 pro/oauth-config.json 을 생성한다.
        # 커밋되지 않고(.gitignore) 빌드마다 새로 만들어져 앱에 번들된다.
        # oauth-obfuscate.js(저장소 루트, 서버용 oauth-default.json과 공용)로
        # 가볍게 은폐(XOR+Base64)해 저장 — 평문 자격증명 패턴이 파일에 그대로
        # 노출되지 않도록 함(완전한 보안은 아님, 상세는 oauth-obfuscate.js 주석 참고).
        # 시크릿이 없으면 빈 파일이 생성되어 게이트가 비활성화된 채로 빌드된다(개발 편의).
        working-directory: pro
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const { encode } = require('../oauth-obfuscate.js');
            const clientId = process.env.GOOGLE_OAUTH_CLIENT_ID || '';
            const clientSecret = process.env.GOOGLE_OAUTH_CLIENT_SECRET || '';
            const data = encode({ clientId, clientSecret });
            fs.writeFileSync('oauth-config.json', JSON.stringify({ v: 2, data }));
            console.log('oauth-config.json 생성됨(난독화) — clientId 설정됨:', !!clientId);
          "
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}

      - name: 빌드 + Release 업로드 (electron-builder)
        working-directory: pro
        run: npm run dist
        env:
          # electron-builder 가 Terminus-MasterSchedule-Pro 저장소에 Release를
          # 올릴 때 쓰는 토큰
          GH_TOKEN: ${{ secrets.PRO_RELEASE_TOKEN }}

      - name: Release 제목에 "Pro" 표시 (Server 릴리즈와 구분)
        # 태그(v0.3.0 등)는 electron-updater가 semver로 파싱해야 하므로 그대로 두고,
        # 화면에 보이는 제목만 "Terminus MasterSchedule Pro vX.Y.Z"로 바꿔 Releases
        # 목록에서 Server 빌드와 한눈에 구분되게 한다(자동업데이트 동작에는 영향 없음).
        working-directory: pro
        shell: bash
        run: node ../scripts/set-release-name.js Pro "$(node -p "require('./package.json').version")"
        env:
          GH_TOKEN: ${{ secrets.PRO_RELEASE_TOKEN }}
          GH_REPO: YooByungHan/Terminus-MasterSchedule-Pro
